# Render deployment config (Infrastructure as Code).
# Docs: https://render.com/docs/blueprint-spec
#
# After connecting your GitHub repo on render.com, this file lets Render
# build & run the app automatically. Set the secret env vars in the dashboard.
services:
  - type: web
    name: the-third-world
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true # Render generates a strong random value
      - key: PUBLIC_URL
        sync: false # set to https://<your-app>.onrender.com after first deploy
      - key: GOOGLE_CLIENT_ID
        sync: false # set in dashboard (secret)
      - key: GOOGLE_CLIENT_SECRET
        sync: false # set in dashboard (secret)
