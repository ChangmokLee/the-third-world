<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home · The Third World</title>
    <link rel="icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="main-bg">
    <div id="userChip" class="user-chip hidden">
      <img id="userPhoto" src="" alt="" />
      <span id="userName"></span>
    </div>

    <img class="logo" src="/logo.png" alt="The Third World" />
    <p class="subtitle" data-i18n="home.subtitle">What would you like to do?</p>

    <div class="panel">
      <a class="btn" href="/host" data-i18n="home.host">📺 Start a new game on TV (Host)</a>
      <a class="btn secondary" href="/play" data-i18n="home.join">📱 Join with a room code</a>
      <form action="/logout" method="post" style="margin-top: 16px">
        <button class="btn secondary" type="submit" data-i18n="home.logout">Log out</button>
      </form>
    </div>

    <script src="/i18n.js"></script>
    <script>
      fetch('/api/me')
        .then((r) => r.json())
        .then((data) => {
          if (!data.authenticated) {
            window.location.href = '/';
            return;
          }
          const chip = document.getElementById('userChip');
          document.getElementById('userName').textContent = data.user.name || 'Player';
          if (data.user.photo) document.getElementById('userPhoto').src = data.user.photo;
          chip.classList.remove('hidden');
        });
    </script>
  </body>
</html>
