<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Host (TV) · The Third World</title>
    <link rel="icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="main-bg">
    <!-- LOBBY -->
    <section id="lobby">
      <img class="logo lg" src="/logo.png" alt="The Third World" />
      <p class="subtitle" data-i18n="host.lobbyHint">Scan the QR code or enter the room code on your phone to join</p>

      <div class="join-row">
        <div class="qr-box">
          <img id="qrImg" alt="Join QR code" />
          <p class="muted" data-i18n="host.scanHint">Scan with your phone camera</p>
        </div>
        <div class="code-box">
          <p class="muted" data-i18n="host.orCode">Or enter the room code</p>
          <div id="roomCode" class="room-code">····</div>
          <p id="joinUrl" class="muted" style="word-break: break-all"></p>
        </div>
      </div>

      <div id="players" class="players-grid"></div>

      <button id="startBtn" class="btn" style="max-width: 360px; margin-top: 28px" disabled>
        Start game (need 1+ players)
      </button>
      <a class="btn secondary" href="/home" style="max-width: 360px; margin-top: 12px" data-i18n="host.back">Back</a>
    </section>

    <!-- PLAYING -->
    <section id="playing" class="hidden">
      <h2 class="brand" style="font-size: clamp(1.6rem, 5vw, 3rem)" data-i18n="host.forkTitle">The Fork</h2>
      <p class="subtitle" data-i18n="host.forkSubtitle">Two paths emerge from the darkness. Which way?</p>
      <p id="roleSummary" class="muted" style="margin-bottom: 16px"></p>
      <p id="roleAckStatus" class="muted" style="margin-bottom: 16px"></p>
      <div class="players-grid" id="voteStatus"></div>
      <p class="muted" style="margin-top: 24px" data-i18n="host.makeChoice">Make your choice on your phone…</p>
    </section>

    <!-- RESULTS -->
    <section id="results" class="hidden">
      <h2 class="brand" data-i18n="host.results">Results</h2>
      <div id="resultsBody"></div>
      <button id="againBtn" class="btn" style="max-width: 360px; margin-top: 24px" data-i18n="host.nextRound">
        Next round
      </button>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/i18n.js"></script>
    <script>
      const socket = io();
      const $ = (id) => document.getElementById(id);
      const t = (k, v) => I18N.t(k, v);

      // Remember the latest dynamic data so we can re-render on language change.
      let lastPlayers = [];
      let lastRoleCounts = null;
      let lastRoleAcks = null;
      let lastTally = null;

      socket.on('connect', () => socket.emit('host:create'));

      socket.on('host:created', (state) => {
        $('roomCode').textContent = state.code;
        if (state.qr) $('qrImg').src = state.qr;
        if (state.joinUrl) $('joinUrl').textContent = state.joinUrl;
        renderPlayers(state.players);
      });

      socket.on('room:update', (state) => {
        renderPlayers(state.players);
        renderVoteStatus(state.players);
      });

      socket.on('game:phase', ({ phase }) => showPhase(phase));

      socket.on('game:roleCounts', (counts) => {
        lastRoleCounts = counts;
        renderRoleCounts();
      });

      socket.on('game:roleAcks', (acks) => {
        lastRoleAcks = acks;
        renderRoleAcks();
      });

      socket.on('game:results', ({ tally }) => {
        lastTally = tally;
        renderResults();
        showPhase('results');
      });

      socket.on('room:closed', () => location.reload());

      $('startBtn').addEventListener('click', () => socket.emit('host:start'));
      $('againBtn').addEventListener('click', () => socket.emit('host:start'));

      // Re-render every dynamic string when the language changes.
      window.addEventListener('ttw:languagechange', () => {
        renderPlayers(lastPlayers);
        renderRoleCounts();
        renderRoleAcks();
        renderResults();
      });

      function renderRoleCounts() {
        if (!lastRoleCounts) return;
        const { good, evil } = lastRoleCounts;
        $('roleSummary').innerHTML =
          `${t('host.alignmentsDealt')} — <b style="color:#7fe3a0">😇 ${t('host.good')} ${good}</b> · ` +
          `<b style="color:#ff8a8a">😈 ${t('host.evil')} ${evil}</b> &nbsp;${t('host.rolesSecret')}`;
      }

      function renderRoleAcks() {
        if (!lastRoleAcks) return;
        const { confirmed, total } = lastRoleAcks;
        $('roleAckStatus').textContent =
          confirmed >= total
            ? t('host.allConfirmed', { total })
            : t('host.confirming', { confirmed, total });
      }

      function renderResults() {
        if (!lastTally) return;
        const labels = { left: t('host.leftPath'), right: t('host.rightPath') };
        const body = $('resultsBody');
        body.innerHTML = '';
        Object.entries(lastTally).forEach(([choice, count]) => {
          const row = document.createElement('p');
          row.style.fontSize = '1.4rem';
          row.textContent = `${labels[choice] || choice}: ${count} ${t('host.votes')}`;
          body.appendChild(row);
        });
      }

      function renderPlayers(players) {
        lastPlayers = players || [];
        const wrap = $('players');
        wrap.innerHTML = '';
        lastPlayers.forEach((p) => {
          const el = document.createElement('div');
          el.className = 'player-pill' + (p.hasChosen ? ' ready' : '');
          el.innerHTML = `<span class="dot"></span>${escapeHtml(p.name)}`;
          wrap.appendChild(el);
        });
        const btn = $('startBtn');
        btn.disabled = lastPlayers.length === 0;
        btn.textContent = lastPlayers.length === 0 ? t('host.startNeed') : t('host.start');
      }

      function renderVoteStatus(players) {
        const wrap = $('voteStatus');
        wrap.innerHTML = '';
        players.forEach((p) => {
          const el = document.createElement('div');
          el.className = 'player-pill' + (p.hasChosen ? ' ready' : '');
          el.innerHTML = `<span class="dot"></span>${escapeHtml(p.name)}`;
          wrap.appendChild(el);
        });
      }

      function showPhase(phase) {
        $('lobby').classList.toggle('hidden', phase !== 'lobby');
        $('playing').classList.toggle('hidden', phase !== 'playing');
        $('results').classList.toggle('hidden', phase !== 'results');
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
        );
      }
    </script>
  </body>
</html>
