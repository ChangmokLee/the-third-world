<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Host (TV) · The Third World</title>
    <link rel="icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="main-bg">
    <!-- LOBBY -->
    <section id="lobby">
      <img class="logo lg" src="/logo.png" alt="The Third World" />
      <p class="subtitle">Scan the QR code or enter the room code on your phone to join</p>

      <div class="join-row">
        <div class="qr-box">
          <img id="qrImg" alt="Join QR code" />
          <p class="muted">Scan with your phone camera</p>
        </div>
        <div class="code-box">
          <p class="muted">Or enter the room code</p>
          <div id="roomCode" class="room-code">····</div>
          <p id="joinUrl" class="muted" style="word-break: break-all"></p>
        </div>
      </div>

      <div id="players" class="players-grid"></div>

      <button id="startBtn" class="btn" style="max-width: 360px; margin-top: 28px" disabled>
        Start game (need 1+ players)
      </button>
    </section>

    <!-- PLAYING -->
    <section id="playing" class="hidden">
      <h2 class="brand" style="font-size: clamp(1.6rem, 5vw, 3rem)">The Fork</h2>
      <p class="subtitle">Two paths emerge from the darkness. Which way?</p>
      <div class="players-grid" id="voteStatus"></div>
      <p class="muted" style="margin-top: 24px">Make your choice on your phone…</p>
    </section>

    <!-- RESULTS -->
    <section id="results" class="hidden">
      <h2 class="brand">Results</h2>
      <div id="resultsBody"></div>
      <button id="againBtn" class="btn" style="max-width: 360px; margin-top: 24px">
        Next round
      </button>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const $ = (id) => document.getElementById(id);

      socket.on('connect', () => socket.emit('host:create'));

      socket.on('host:created', (state) => {
        $('roomCode').textContent = state.code;
        if (state.qr) $('qrImg').src = state.qr;
        if (state.joinUrl) $('joinUrl').textContent = state.joinUrl;
        renderPlayers(state.players);
      });

      socket.on('room:update', (state) => {
        renderPlayers(state.players);
        renderVoteStatus(state.players);
      });

      socket.on('game:phase', ({ phase }) => showPhase(phase));

      socket.on('game:results', ({ tally }) => {
        const labels = { left: 'Left path', right: 'Right path' };
        const body = $('resultsBody');
        body.innerHTML = '';
        Object.entries(tally).forEach(([choice, count]) => {
          const row = document.createElement('p');
          row.style.fontSize = '1.4rem';
          row.textContent = `${labels[choice] || choice}: ${count} votes`;
          body.appendChild(row);
        });
        showPhase('results');
      });

      socket.on('room:closed', () => location.reload());

      $('startBtn').addEventListener('click', () => socket.emit('host:start'));
      $('againBtn').addEventListener('click', () => socket.emit('host:start'));

      function renderPlayers(players) {
        const wrap = $('players');
        wrap.innerHTML = '';
        players.forEach((p) => {
          const el = document.createElement('div');
          el.className = 'player-pill' + (p.hasChosen ? ' ready' : '');
          el.innerHTML = `<span class="dot"></span>${escapeHtml(p.name)}`;
          wrap.appendChild(el);
        });
        const btn = $('startBtn');
        btn.disabled = players.length === 0;
        btn.textContent = players.length === 0 ? 'Start game (need 1+ players)' : 'Start game';
      }

      function renderVoteStatus(players) {
        const wrap = $('voteStatus');
        wrap.innerHTML = '';
        players.forEach((p) => {
          const el = document.createElement('div');
          el.className = 'player-pill' + (p.hasChosen ? ' ready' : '');
          el.innerHTML = `<span class="dot"></span>${escapeHtml(p.name)}`;
          wrap.appendChild(el);
        });
      }

      function showPhase(phase) {
        $('lobby').classList.toggle('hidden', phase !== 'lobby');
        $('playing').classList.toggle('hidden', phase !== 'playing');
        $('results').classList.toggle('hidden', phase !== 'results');
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
        );
      }
    </script>
  </body>
</html>
