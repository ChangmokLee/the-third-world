<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Third World</title>
    <link rel="icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="signin-bg">
    <img class="logo" src="/logo.png" alt="The Third World" />
    <p class="subtitle" data-i18n="signin.subtitle">Cast it on the TV, play together with your phones — a D&amp;D party game</p>

    <div class="panel signin-panel">
      <p data-i18n="signin.prompt">Sign in with Google to begin.</p>
      <a class="btn google" href="/auth/google">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.26 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/>
        </svg>
        <span data-i18n="signin.google">Sign in with Google</span>
      </a>
      <p id="notice" class="muted hidden" style="margin-top: 16px"></p>
      <p class="muted" style="margin-top: 18px" data-i18n="signin.note">
        Both hosts and players need to sign in with Google.
      </p>
    </div>

    <script src="/i18n.js"></script>
    <script>
      // If Google isn't configured yet, let the host know.
      fetch('/api/me')
        .then((r) => r.json())
        .then((data) => {
          if (data.authenticated) {
            window.location.href = '/home';
          } else if (!data.googleConfigured) {
            const n = document.getElementById('notice');
            n.textContent = I18N.t('signin.notConfigured');
            n.classList.remove('hidden');
            window.addEventListener('ttw:languagechange', () => {
              n.textContent = I18N.t('signin.notConfigured');
            });
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
