<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Third World</title>
    <link rel="icon" href="/logo.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <img class="logo" src="/logo.png" alt="The Third World" />
    <p class="subtitle">TV에 띄우고 휴대폰으로 함께 즐기는 D&amp;D 파티 게임</p>

    <div class="panel">
      <p>시작하려면 구글 계정으로 로그인하세요.</p>
      <a class="btn google" href="/auth/google">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.99.66-2.26 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/>
        </svg>
        Google로 로그인
      </a>
      <p id="notice" class="muted hidden" style="margin-top: 16px"></p>
      <p class="muted" style="margin-top: 18px">
        호스트도, 참여자도 모두 구글 로그인이 필요해요.
      </p>
    </div>

    <script>
      // If Google isn't configured yet, let the host know.
      fetch('/api/me')
        .then((r) => r.json())
        .then((data) => {
          if (data.authenticated) {
            window.location.href = '/home';
          } else if (!data.googleConfigured) {
            const n = document.getElementById('notice');
            n.textContent =
              '⚠ 구글 로그인이 아직 설정되지 않았습니다. README의 안내대로 .env를 설정하세요.';
            n.classList.remove('hidden');
          }
        })
        .catch(() => {});
    </script>
  </body>
</html>
