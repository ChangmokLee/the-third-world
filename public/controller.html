<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Join · The Third World</title>
    <link rel="icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="main-bg">
    <!-- JOIN -->
    <section id="join">
      <img class="logo sm" src="/logo.png" alt="The Third World" />
      <div class="panel">
        <p class="muted">Enter the 4-letter room code shown on the TV</p>
        <input id="codeInput" class="code-input" type="text" maxlength="4"
               placeholder="ABCD" autocapitalize="characters" autocomplete="off" />
        <input id="nameInput" type="text" maxlength="16" placeholder="Nickname" autocomplete="off" />
        <button id="joinBtn" class="btn">Join</button>
        <a class="btn secondary" href="/home" style="margin-top: 12px">Back</a>
        <p id="joinError" class="error"></p>
      </div>
    </section>

    <!-- WAITING -->
    <section id="waiting" class="hidden">
      <h2 class="brand" style="font-size: 2rem">You're in!</h2>
      <p class="subtitle">Room <b id="roomLabel"></b> · <span id="meLabel"></span></p>
      <p class="muted">Waiting for the host to start the game…</p>
    </section>

    <!-- ROLE REVEAL -->
    <section id="role" class="hidden">
      <div class="lang-toggle" id="langToggle">
        <button type="button" data-lang="en" class="active">EN</button>
        <button type="button" data-lang="ko">한국어</button>
      </div>
      <div id="roleCard" class="role-card">
        <div class="role-card-overlay">
          <p class="role-kicker" id="roleKicker"></p>
          <h2 class="role-title" id="roleTitle"></h2>
          <p class="role-orders" id="roleOrders"></p>
        </div>
      </div>
      <button id="roleConfirmBtn" class="btn" style="margin-top: 18px; max-width: 360px">I accept my fate</button>
      <p id="roleAckMsg" class="muted" style="margin-top: 12px"></p>
    </section>

    <!-- CHOICE -->
    <section id="choosing" class="hidden">
      <h2 class="brand" style="font-size: 1.8rem">Decision Time</h2>
      <div class="panel">
        <p>Which path will you take?</p>
        <div class="choices">
          <button class="choice-btn" data-choice="left">⬅ Left path</button>
          <button class="choice-btn" data-choice="right">Right path ➡</button>
        </div>
        <p id="choiceMsg" class="muted" style="margin-top: 16px"></p>
      </div>
    </section>

    <!-- DONE -->
    <section id="done" class="hidden">
      <h2 class="brand">Choice locked in</h2>
      <p class="subtitle">Check the TV screen!</p>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const $ = (id) => document.getElementById(id);
      const ERRORS = {
        ROOM_NOT_FOUND: 'Room not found. Check the code.',
        ROOM_FULL: 'The room is full.',
        NAME_REQUIRED: 'Please enter a nickname.',
      };

      // Prefill code from ?code= if present (QR links include it).
      const params = new URLSearchParams(location.search);
      const codeFromQr = (params.get('code') || '').toUpperCase();
      if (codeFromQr) $('codeInput').value = codeFromQr;

      // The player is logged in (route is protected); prefill their Google name.
      // When they arrived via a QR link (?code=...), join the room automatically
      // so they don't have to re-enter anything after signing in.
      fetch('/api/me')
        .then((r) => r.json())
        .then((data) => {
          const myName = data.user?.name ? data.user.name.slice(0, 16) : '';
          if (myName && !$('nameInput').value) $('nameInput').value = myName;

          if (codeFromQr && myName) {
            socket.emit('player:join', { code: codeFromQr, name: myName });
          }
        })
        .catch(() => {});

      $('codeInput').addEventListener('input', (e) => {
        e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      });

      $('joinBtn').addEventListener('click', () => {
        const code = $('codeInput').value.trim();
        const name = $('nameInput').value.trim();
        $('joinError').textContent = '';
        if (!code || !name) {
          $('joinError').textContent = 'Please enter both the room code and a nickname.';
          return;
        }
        socket.emit('player:join', { code, name });
      });

      socket.on('player:error', ({ code }) => {
        $('joinError').textContent = ERRORS[code] || 'Failed to join.';
      });

      socket.on('player:joined', ({ code, name }) => {
        $('roomLabel').textContent = code;
        $('meLabel').textContent = name;
        show('waiting');
      });

      // Secret alignment, revealed only on this player's phone.
      let myRole = null;
      let myClass = null;
      let roleConfirmed = false;
      let currentPhase = 'lobby';

      // Bilingual copy for the role card. Class names are keyed by class id.
      const I18N = {
        en: {
          goodKicker: 'By Command of the Emperor',
          goodOrders:
            'You are named to the Emperor\u2019s expedition. Carry out your charge with honor and return home victorious.',
          goodFallback: 'Appointed to the Expedition',
          evilKicker: 'Decree of the Cult of the Fallen',
          evilOrders:
            'You march among the chosen — not to save them, but to ensure none return. Let the Third World fall into shadow.',
          evilFallback: 'Doom the Expedition',
          confirm: 'I accept my fate',
          waiting: 'Waiting for everyone to confirm…',
          classes: {
            'emperor-knight': 'Knight of the Emperor',
            inquisitor: 'Inquisitor',
            'court-wizard': 'Court Wizard',
            'fallen-knight': 'Fallen Knight',
            succubus: 'Succubus',
          },
        },
        ko: {
          goodKicker: '황제의 명령',
          goodOrders:
            '그대를 원정대로 임명한다. 임무를 무사히 마치고 명예롭게 귀환하라.',
          goodFallback: '원정대로 임명되었다',
          evilKicker: '악의 교단 명령서',
          evilOrders:
            '그대는 선택받은 자들 사이를 걷는다 — 그들을 구하기 위해서가 아니라, 누구도 돌아오지 못하게 하기 위해. 원정대를 파멸시켜라.',
          evilFallback: '원정대를 파멸시켜라',
          confirm: '운명을 받아들인다',
          waiting: '모두가 확인하기를 기다리는 중…',
          classes: {
            'emperor-knight': '황제의 기사',
            inquisitor: '이단 심문관',
            'court-wizard': '궁정 마법사',
            'fallen-knight': '타락한 기사',
            succubus: '서큐버스',
          },
        },
      };

      let lang = localStorage.getItem('ttw-lang') || 'en';

      function renderRoleCard() {
        if (!myRole) return;
        const t = I18N[lang];
        const card = $('roleCard');
        const classId = myClass?.id || '';
        const className = classId ? t.classes[classId] : '';
        if (myRole === 'evil') {
          card.style.backgroundImage = classId ? `url('/${classId}.png')` : "url('/bad-team.png')";
          card.classList.add('evil');
          card.classList.remove('good');
          $('roleKicker').textContent = t.evilKicker;
          $('roleTitle').textContent = className || t.evilFallback;
          $('roleOrders').textContent = t.evilOrders;
        } else {
          card.style.backgroundImage = classId ? `url('/${classId}.png')` : "url('/good-team.png')";
          card.classList.add('good');
          card.classList.remove('evil');
          $('roleKicker').textContent = t.goodKicker;
          $('roleTitle').textContent = className || t.goodFallback;
          $('roleOrders').textContent = t.goodOrders;
        }
        // Confirm button text follows the language until the player confirms.
        if (!roleConfirmed) $('roleConfirmBtn').textContent = t.confirm;
        if (roleConfirmed) $('roleAckMsg').textContent = t.waiting;
      }

      // Language toggle.
      function setLang(next) {
        lang = next;
        localStorage.setItem('ttw-lang', next);
        document.querySelectorAll('#langToggle button').forEach((b) =>
          b.classList.toggle('active', b.dataset.lang === next)
        );
        renderRoleCard();
      }
      document.querySelectorAll('#langToggle button').forEach((b) =>
        b.addEventListener('click', () => setLang(b.dataset.lang))
      );
      setLang(lang); // sync toggle highlight on load

      socket.on('game:role', ({ role, charClass }) => {
        myRole = role;
        myClass = charClass || null;
        roleConfirmed = false;
        $('roleConfirmBtn').disabled = false;
        $('roleAckMsg').textContent = '';
        renderRoleCard();
        show('role');
      });

      // The player must confirm before their choice screen opens.
      $('roleConfirmBtn').addEventListener('click', () => {
        if (roleConfirmed) return;
        roleConfirmed = true;
        socket.emit('player:roleAck');
        $('roleConfirmBtn').disabled = true;
        $('roleAckMsg').textContent = I18N[lang].waiting;
        if (currentPhase === 'playing') show('choosing');
      });

      socket.on('game:phase', ({ phase }) => {
        currentPhase = phase;
        if (phase === 'playing') {
          resetChoice();
          // Hold on the role card until this player taps confirm.
          if (myRole && !roleConfirmed) {
            show('role');
          } else {
            show('choosing');
          }
        } else if (phase === 'results') {
          show('done');
        }
      });

      socket.on('room:closed', () => {
        alert('The host has closed the room.');
        location.href = '/';
      });

      document.querySelectorAll('.choice-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.choice-btn').forEach((b) => b.classList.remove('selected'));
          btn.classList.add('selected');
          socket.emit('player:choice', { choice: btn.dataset.choice });
          $('choiceMsg').textContent = 'Choice sent! Tap again to change it.';
        });
      });

      function resetChoice() {
        document.querySelectorAll('.choice-btn').forEach((b) => b.classList.remove('selected'));
        $('choiceMsg').textContent = '';
      }

      function show(id) {
        ['join', 'waiting', 'role', 'choosing', 'done'].forEach((s) =>
          $(s).classList.toggle('hidden', s !== id)
        );
      }
    </script>
  </body>
</html>
