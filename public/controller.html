<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Join · The Third World</title>
    <link rel="icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="main-bg">
    <!-- JOIN -->
    <section id="join">
      <img class="logo sm" src="/logo.png" alt="The Third World" />
      <div class="panel">
        <p class="muted" data-i18n="join.codeHint">Enter the 4-letter room code shown on the TV</p>
        <input id="codeInput" class="code-input" type="text" maxlength="4"
               placeholder="ABCD" data-i18n-placeholder="join.codePlaceholder" autocapitalize="characters" autocomplete="off" />
        <input id="nameInput" type="text" maxlength="16" placeholder="Nickname" data-i18n-placeholder="join.namePlaceholder" autocomplete="off" />
        <button id="joinBtn" class="btn" data-i18n="join.join">Join</button>
        <a class="btn secondary" href="/home" style="margin-top: 12px" data-i18n="join.back">Back</a>
        <p id="joinError" class="error"></p>
      </div>
    </section>

    <!-- WAITING -->
    <section id="waiting" class="hidden">
      <h2 class="brand" style="font-size: 2rem" data-i18n="wait.title">You're in!</h2>
      <p class="subtitle"><span data-i18n="wait.room">Room</span> <b id="roomLabel"></b> · <span id="meLabel"></span></p>
      <p class="muted" data-i18n="wait.waiting">Waiting for the host to start the game…</p>
    </section>

    <!-- ROLE REVEAL -->
    <section id="role" class="hidden">
      <div id="roleCard" class="role-card">
        <div class="role-card-overlay">
          <p class="role-kicker" id="roleKicker"></p>
          <h2 class="role-title" id="roleTitle"></h2>
          <p class="role-orders" id="roleOrders"></p>
        </div>
      </div>
      <button id="roleConfirmBtn" class="btn" style="margin-top: 18px; max-width: 360px">I accept my fate</button>
      <p id="roleAckMsg" class="muted" style="margin-top: 12px"></p>
    </section>

    <!-- CHOICE -->
    <section id="choosing" class="hidden">
      <h2 class="brand" style="font-size: 1.8rem">Decision Time</h2>
      <div class="panel">
        <p data-i18n="choose.prompt">Which path will you take?</p>
        <div class="choices">
          <button class="choice-btn" data-choice="left" data-i18n="choose.left">⬅ Left path</button>
          <button class="choice-btn" data-choice="right" data-i18n="choose.right">Right path ➡</button>
        </div>
        <p id="choiceMsg" class="muted" style="margin-top: 16px"></p>
      </div>
    </section>

    <!-- DONE -->
    <section id="done" class="hidden">
      <h2 class="brand" data-i18n="done.title">Choice locked in</h2>
      <p class="subtitle" data-i18n="done.subtitle">Check the TV screen!</p>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/i18n.js"></script>
    <script>
      const socket = io();
      const $ = (id) => document.getElementById(id);
      const t = (k, v) => I18N.t(k, v);
      const ERRORS = {
        ROOM_NOT_FOUND: 'join.errRoomNotFound',
        ROOM_FULL: 'join.errRoomFull',
        NAME_REQUIRED: 'join.errNameRequired',
      };

      // Prefill code from ?code= if present (QR links include it).
      const params = new URLSearchParams(location.search);
      const codeFromQr = (params.get('code') || '').toUpperCase();
      if (codeFromQr) $('codeInput').value = codeFromQr;

      // The player is logged in (route is protected); prefill their Google name.
      // When they arrived via a QR link (?code=...), join the room automatically
      // so they don't have to re-enter anything after signing in.
      fetch('/api/me')
        .then((r) => r.json())
        .then((data) => {
          const myName = data.user?.name ? data.user.name.slice(0, 16) : '';
          if (myName && !$('nameInput').value) $('nameInput').value = myName;

          if (codeFromQr && myName) {
            socket.emit('player:join', { code: codeFromQr, name: myName });
          }
        })
        .catch(() => {});

      $('codeInput').addEventListener('input', (e) => {
        e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      });

      $('joinBtn').addEventListener('click', () => {
        const code = $('codeInput').value.trim();
        const name = $('nameInput').value.trim();
        $('joinError').textContent = '';
        if (!code || !name) {
          $('joinError').textContent = t('join.bothRequired');
          return;
        }
        socket.emit('player:join', { code, name });
      });

      socket.on('player:error', ({ code }) => {
        $('joinError').textContent = t(ERRORS[code] || 'join.errGeneric');
      });

      socket.on('player:joined', ({ code, name }) => {
        $('roomLabel').textContent = code;
        $('meLabel').textContent = name;
        show('waiting');
      });

      // Secret alignment, revealed only on this player's phone.
      let myRole = null;
      let myClass = null;
      let roleConfirmed = false;
      let currentPhase = 'lobby';

      function renderRoleCard() {
        if (!myRole) return;
        const card = $('roleCard');
        const classId = myClass?.id || '';
        const className = classId ? t('class.' + classId) : '';
        if (myRole === 'evil') {
          card.style.backgroundImage = classId ? `url('/${classId}.png')` : "url('/bad-team.png')";
          card.classList.add('evil');
          card.classList.remove('good');
          $('roleKicker').textContent = t('role.evilKicker');
          $('roleTitle').textContent = className || t('role.evilFallback');
          $('roleOrders').textContent = t('role.evilOrders');
        } else {
          card.style.backgroundImage = classId ? `url('/${classId}.png')` : "url('/good-team.png')";
          card.classList.add('good');
          card.classList.remove('evil');
          $('roleKicker').textContent = t('role.goodKicker');
          $('roleTitle').textContent = className || t('role.goodFallback');
          $('roleOrders').textContent = t('role.goodOrders');
        }
        // Confirm button + waiting message follow the language.
        if (!roleConfirmed) $('roleConfirmBtn').textContent = t('role.confirm');
        if (roleConfirmed) $('roleAckMsg').textContent = t('role.waiting');
      }

      // Re-render dynamic strings when the shared language toggle changes.
      window.addEventListener('ttw:languagechange', () => {
        renderRoleCard();
        if (!$('choiceMsg').textContent) return;
        $('choiceMsg').textContent = t('choose.sent');
      });

      socket.on('game:role', ({ role, charClass }) => {
        myRole = role;
        myClass = charClass || null;
        roleConfirmed = false;
        $('roleConfirmBtn').disabled = false;
        $('roleAckMsg').textContent = '';
        renderRoleCard();
        show('role');
      });

      // The player must confirm before their choice screen opens.
      $('roleConfirmBtn').addEventListener('click', () => {
        if (roleConfirmed) return;
        roleConfirmed = true;
        socket.emit('player:roleAck');
        $('roleConfirmBtn').disabled = true;
        $('roleAckMsg').textContent = t('role.waiting');
        if (currentPhase === 'playing') show('choosing');
      });

      socket.on('game:phase', ({ phase }) => {
        currentPhase = phase;
        if (phase === 'playing') {
          resetChoice();
          // Hold on the role card until this player taps confirm.
          if (myRole && !roleConfirmed) {
            show('role');
          } else {
            show('choosing');
          }
        } else if (phase === 'results') {
          show('done');
        }
      });

      socket.on('room:closed', () => {
        alert(t('common.roomClosed'));
        location.href = '/';
      });

      document.querySelectorAll('.choice-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.choice-btn').forEach((b) => b.classList.remove('selected'));
          btn.classList.add('selected');
          socket.emit('player:choice', { choice: btn.dataset.choice });
          $('choiceMsg').textContent = t('choose.sent');
        });
      });

      function resetChoice() {
        document.querySelectorAll('.choice-btn').forEach((b) => b.classList.remove('selected'));
        $('choiceMsg').textContent = '';
      }

      function show(id) {
        ['join', 'waiting', 'role', 'choosing', 'done'].forEach((s) =>
          $(s).classList.toggle('hidden', s !== id)
        );
      }
    </script>
  </body>
</html>
